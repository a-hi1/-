# MySQL连接配置（按你本机修改）
# MySQL 8 常见需要：useSSL=false + allowPublicKeyRetrieval=true
# 注意：characterEncoding 这里是 Java 字符集名，不支持填 MySQL 的 utf8mb4。
# 数据库/表使用 utf8mb4 没问题；连接层用 UTF-8 即可正确传输 4 字节字符。
db.url=jdbc:mysql://127.0.0.1:3306/mbti?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=5000

db.username=root
db.password=123456

# 仅用作展示（不是必须）
app.name=MBTI职业性格测试系统
